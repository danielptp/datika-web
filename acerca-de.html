  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n          <p data-i18n=\"ab.mv.1d\" style=\"font-family:'Archivo Black',sans-serif;font-size:clamp(1.4rem,2.6vw,2.1rem);line-height:1.08;letter-spacing:-0.02em;text-transform:uppercase;color:var(--text);\">Que decidás con evidencia, no con intuición.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface);border:1px solid var(--rule);border-radius:20px;padding:2rem 1.8rem;transition:background .4s;\">\n          <div data-i18n=\"ab.mv.2t\" style=\"font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--eyebrow);margin-bottom:0.9rem;\">Visión<\u002Fdiv>\n          <p data-i18n=\"ab.mv.2d\" style=\"font-family:'Archivo Black',sans-serif;font-size:clamp(1.4rem,2.6vw,2.1rem);line-height:1.08;letter-spacing:-0.02em;text-transform:uppercase;color:var(--text);\">El estándar de datos para las PYMEs de la región.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section data-screen-label=\"Acerca · CTA\" style=\"position:relative;background:var(--ink-block);color:var(--on-ink);padding:clamp(5rem,13vh,8rem) clamp(1.5rem,5vw,5rem);overflow:hidden;transition:background .4s;\">\n    <div style=\"position:absolute;top:50%;right:clamp(1rem,5vw,4rem);transform:translateY(-50%);display:flex;align-items:flex-end;gap:clamp(10px,1.4vw,20px);opacity:0.9;pointer-events:none;\">\n      <span style=\"width:clamp(20px,3vw,42px);height:clamp(60px,10vw,130px);background:var(--sage-d);border-radius:10px;\"><\u002Fspan>\n      <span style=\"width:clamp(20px,3vw,42px);height:clamp(100px,16vw,210px);background:var(--sage);border-radius:10px;\"><\u002Fspan>\n      <span style=\"width:clamp(20px,3vw,42px);height:clamp(150px,22vw,300px);background:var(--sage-l);border-radius:10px;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"max-width:1240px;margin:0 auto;width:100%;position:relative;z-index:1;\">\n      <h2 data-i18n=\"ab.cta.h2\" style=\"font-family:'Archivo Black',sans-serif;font-size:clamp(2.6rem,8vw,6rem);line-height:0.9;letter-spacing:-0.035em;text-transform:uppercase;color:var(--on-ink);margin-bottom:1.4rem;\">¿Hablamos?<\u002Fh2>\n      <p data-i18n=\"ab.cta.sub\" style=\"font-family:'Archivo',sans-serif;font-style:italic;font-size:clamp(1.1rem,1.9vw,1.5rem);line-height:1.4;color:var(--sage-l);max-width:34ch;margin-bottom:2.4rem;\">Tu negocio ya genera los datos. Falta verlos claro.<\u002Fp>\n      <a href=\"mailto:datika.sv@gmail.com?subject=Quiero%20un%20diagn%C3%B3stico%20%E2%80%94%20D%C3%81TIKA\" data-i18n=\"ab.cta.btn\" style=\"display:inline-flex;align-items:center;gap:0.6rem;background:#F4EFE6;color:#1E1A2E;padding:1.05rem 1.7rem;border-radius:11px;font-size:0.82rem;font-weight:600;text-transform:uppercase;letter-spacing:0.13em;transition:background .25s,transform .25s;\" style-hover=\"background:var(--sage-l);transform:translateY(-2px);\">\n        Agendá tu diagnóstico\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M2 7h10M8 3l4 4-4 4\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:var(--page);padding:1.8rem clamp(1.5rem,5vw,5rem);display:flex;flex-wrap:wrap;gap:0.8rem 1.4rem;align-items:center;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);border-top:1px solid var(--rule);transition:background .4s,border-color .4s;\">\n    <div style=\"display:flex;flex-wrap:wrap;gap:0.5rem 0.9rem;align-items:center;\">\n      <span>© 2026 DÁTIKA<\u002Fspan><span style=\"color:var(--rule);\">·<\u002Fspan><span data-i18n=\"foot.region\">El Salvador<\u002Fspan><span style=\"color:var(--rule);\">·<\u002Fspan><span>Daniel Pineda &amp; Gabriela Lazo<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:1.1rem;align-items:center;\">\n      <a href=\"trabaja-con-nosotros.html\" data-i18n=\"foot.careers\" style=\"transition:color .25s;\" style-hover=\"color:var(--sage-d);\">Trabajá con nosotros<\u002Fa>\n      <a href=\"https://www.instagram.com/somosdatika/\" style=\"transition:color .25s;\" style-hover=\"color:var(--sage-d);\">Instagram<\u002Fa>\n      <a href=\"https://www.linkedin.com/company/somosdatika\" style=\"transition:color .25s;\" style-hover=\"color:var(--sage-d);\">LinkedIn<\u002Fa>\n      <a href=\"#\" id=\"ccManage\" style=\"transition:color .25s;\" style-hover=\"color:var(--sage-d);\">Cookies<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() { return {}; }\n\n  componentDidMount() {\n    this.EN = {\n      'nav.home': 'Home', 'cta.full': 'Book your diagnostic', 'cta.short': 'Book',\n      'ab.pill': 'About · DÁTIKA',\n      'ab.h1': 'Two heads,<br><span style=\"color:var(--sage-d);\">one goal.<\u002Fspan>',\n      'ab.lede': 'We were born watching entrepreneurs work tirelessly — but in the dark. We exist so you see clearly.',\n      'ab.team.eyebrow': 'Who\\u2019s behind it',\n      'ab.d.name': 'Daniel Pineda', 'ab.d.role': 'Co-founder · Data',\n      'ab.d.line': 'Makes a complex database simple.',\n      'ab.d.c1': 'Power BI · Looker', 'ab.d.c2': 'Predictive models', 'ab.d.c3': 'Financial modeling',\n      'ab.g.name': 'Gabriela Lazo', 'ab.g.role': 'Co-founder · Marketing',\n      'ab.g.line': 'Turns the numbers into market decisions.',\n      'ab.g.c1': 'Pricing · Positioning', 'ab.g.c2': 'Competition', 'ab.g.c3': 'Data storytelling',\n      'ab.eq.1': 'Logic', 'ab.eq.2': 'Creativity', 'ab.eq.3': 'Clarity',\n      'ab.eq.line': 'Every analysis carries both perspectives. Not vendors: partners in your business.',\n      'ab.mv.eyebrow': 'Our north star',\n      'ab.mv.1t': 'Mission', 'ab.mv.1d': 'That you decide with evidence, not gut feeling.',\n      'ab.mv.2t': 'Vision', 'ab.mv.2d': 'The data standard for the region\\u2019s SMBs.',\n      'ab.cta.h2': 'Shall we talk?', 'ab.cta.sub': 'Your business already generates the data. It just needs to be seen clearly.',\n      'ab.cta.btn': 'Book your diagnostic',\n      'foot.region': 'El Salvador', 'foot.careers': 'Work with us'\n    };\n    this.META = { es: { title: 'DÁTIKA | Acerca de' }, en: { title: 'DÁTIKA | About us' } };\n    this.setupI18n();\n    this.setupTheme();\n    this.setupCookies();\n    this.setupMotif();\n  }\n  componentWillUnmount() {\n    if (this.raf) cancelAnimationFrame(this.raf);\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n\n  setupI18n() {\n    const nodes = document.querySelectorAll('[data-i18n]');\n    nodes.forEach(el => { el.dataset.es = el.innerHTML; });\n    const sw = document.getElementById('langSwitch');\n    const btns = sw ? sw.querySelectorAll('button') : [];\n    const styleBtn = (b, active) => { b.style.background = active ? 'var(--ink-block)' : 'transparent'; b.style.color = active ? 'var(--on-ink)' : 'var(--text-soft)'; };\n    this.setLang = (lang) => {\n      document.documentElement.lang = lang;\n      nodes.forEach(el => { const k = el.dataset.i18n; el.innerHTML = (lang === 'en' && this.EN[k] !== undefined) ? this.EN[k] : el.dataset.es; });\n      const m = this.META[lang]; if (m && m.title) document.title = m.title;\n      btns.forEach(b => styleBtn(b, b.dataset.lang === lang));\n      try { localStorage.setItem('datika-lang', lang); } catch (e) {}\n    };\n    btns.forEach(b => b.addEventListener('click', () => this.setLang(b.dataset.lang)));\n    let lang = 'es';\n    try { const s = localStorage.getItem('datika-lang'); if (s === 'en' || s === 'es') lang = s; } catch (e) {}\n    if (lang === 'en') this.setLang('en'); else btns.forEach(b => styleBtn(b, b.dataset.lang === 'es'));\n  }\n\n  applyBg() {\n    const layer = document.getElementById('bg-layer');\n    if (layer) layer.style.background = document.documentElement.getAttribute('data-theme') === 'dark' ? '#131019' : '#F4EFE6';\n  }\n  setupTheme() {\n    this.applyBg();\n    const btn = document.getElementById('themeToggle');\n    if (!btn) return;\n    btn.addEventListener('click', () => {\n      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';\n      document.documentElement.setAttribute('data-theme', next);\n      try { localStorage.setItem('datika-theme', next); } catch (e) {}\n      this.dark = next === 'dark';\n      this.applyBg();\n    });\n  }\n\n  setupCookies() {\n    let choice = null;\n    try { choice = localStorage.getItem('datika-consent'); } catch (e) {}\n    const apply = (state) => {\n      try { localStorage.setItem('datika-consent', state); } catch (e) {}\n      if (state === 'granted' && typeof window.gtag === 'function') {\n        window.gtag('consent', 'update', { ad_storage:'granted', ad_user_data:'granted', ad_personalization:'granted', analytics_storage:'granted' });\n      }\n      const b = document.getElementById('ccBanner');\n      if (b) { b.style.opacity = '0'; b.style.transform = 'translateY(20px)'; setTimeout(() => b.remove(), 350); }\n    };\n    const show = () => {\n      if (document.getElementById('ccBanner')) return;\n      const lang = document.documentElement.lang === 'en' ? 'en' : 'es';\n      const T = { es:{title:'Privacidad y cookies',text:'Usamos cookies de Google Analytics solo para entender cómo se usa el sitio. Vos decidís.',ok:'Aceptar medición',no:'Solo lo esencial'}, en:{title:'Privacy & cookies',text:'We use Google Analytics cookies only to understand how the site is used. You decide.',ok:'Accept measurement',no:'Essentials only'} }[lang];\n      const el = document.createElement('div');\n      el.id = 'ccBanner';\n      el.setAttribute('role', 'dialog');\n      el.setAttribute('aria-label', T.title);\n      el.style.cssText = \"position:fixed;right:18px;bottom:18px;z-index:300;width:330px;max-width:calc(100vw - 36px);background:var(--surface);border:1px solid var(--rule);border-radius:14px;padding:1.1rem 1.2rem;box-shadow:0 18px 44px -16px rgba(30,26,46,.3);opacity:0;transform:translateY(20px);transition:opacity .35s ease,transform .35s cubic-bezier(.6,.05,.2,1);\";\n      const btnOk = \"flex:1;white-space:nowrap;appearance:none;cursor:pointer;border-radius:8px;font-family:'Archivo',sans-serif;font-weight:600;font-size:.78rem;padding:.6rem .9rem;background:var(--cta-bg);color:var(--cta-fg);border:1.5px solid var(--cta-bg);transition:transform .2s;\";\n      const btnNo = \"flex:1;white-space:nowrap;appearance:none;cursor:pointer;border-radius:8px;font-family:'Archivo',sans-serif;font-weight:600;font-size:.78rem;padding:.6rem .9rem;background:transparent;color:var(--text);border:1.5px solid var(--rule);transition:border-color .2s;\";\n      el.innerHTML = '<div style=\"font-family:\\'JetBrains Mono\\',monospace;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--sage-d);margin-bottom:.45rem;font-weight:500;\">' + T.title + '<\u002Fdiv><p style=\"font-size:.78rem;color:var(--text-soft);line-height:1.5;margin:0 0 .85rem;\">' + T.text + '<\u002Fp><div style=\"display:flex;gap:.5rem;flex-wrap:wrap;\"><button id=\"ccOk\" style=\"' + btnOk + '\">' + T.ok + '<\u002Fbutton><button id=\"ccNo\" style=\"' + btnNo + '\">' + T.no + '<\u002Fbutton><\u002Fdiv>';\n      document.body.appendChild(el);\n      requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });\n      el.querySelector('#ccOk').addEventListener('click', () => apply('granted'));\n      el.querySelector('#ccNo').addEventListener('click', () => apply('denied'));\n    };\n    if (!choice) setTimeout(show, 900);\n    const manage = document.getElementById('ccManage');\n    if (manage) manage.addEventListener('click', (e) => { e.preventDefault(); try { localStorage.removeItem('datika-consent'); } catch (err) {} show(); });\n  }\n\n  setupMotif() {\n    const canvas = document.getElementById('datika-motif');\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const animate = !reduce;\n    const lerp = (a, b, t) => a + (b - a) * t;\n    const smooth = t => t * t * (3 - 2 * t);\n    this.dark = document.documentElement.getAttribute('data-theme') === 'dark';\n    let W = 0, H = 0, dpr = 1, parts = [], links = [];\n    const buildOrder = () => {\n      const pts = [];\n      const marginX = W * 0.09, usableW = W - marginX * 2;\n      const cols = Math.max(10, Math.round(usableW / Math.max(46, W / 26)));\n      const colW = usableW / cols;\n      const dotGap = Math.max(14, Math.min(22, H / 40));\n      const baseY = H * 0.8;\n      const maxDots = Math.min(15, Math.floor((H * 0.5) / dotGap));\n      for (let i = 0; i < cols; i++) {\n        const t = cols > 1 ? i / (cols - 1) : 0;\n        const wave = Math.sin(t * Math.PI * 2.2) * 0.18;\n        const hN = Math.max(0.12, 0.25 + t * 0.6 + wave);\n        const h = Math.max(2, Math.round(2 + hN * maxDots));\n        const x = marginX + colW * i + colW / 2;\n        for (let j = 0; j < h; j++) pts.push({ x, y: baseY - j * dotGap, top: j === h - 1 });\n      }\n      return pts;\n    };\n    const setup = () => {\n      dpr = Math.min(2, window.devicePixelRatio || 1);\n      W = window.innerWidth; H = window.innerHeight;\n      canvas.width = W * dpr; canvas.height = H * dpr;\n      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      const order = buildOrder();\n      const keep = Math.max(40, Math.round(order.length * 0.6));\n      const step = order.length / keep;\n      const chosen = [];\n      for (let k = 0; k < keep; k++) chosen.push(order[Math.floor(k * step)]);\n      parts = chosen.map(o => ({ ox: o.x, oy: o.y, top: o.top, cx: Math.random() * W, cy: Math.random() * H, ph: Math.random() * Math.PI * 2, sp: 0.6 + Math.random() * 0.9, amp: 8 + Math.random() * 16 }));\n      links = [];\n      for (let i = 0; i < parts.length; i++) links.push([i, (i + 1 + Math.floor(Math.random() * 3)) % parts.length]);\n    };\n    const progress = () => {\n      const de = document.documentElement;\n      const max = (de.scrollHeight - de.clientHeight) || 1;\n      return Math.min(1, Math.max(0, (window.scrollY || de.scrollTop) / max));\n    };\n    const t0 = performance.now();\n    const px = (pa, tt, p) => lerp(pa.cx, pa.ox, p) + (animate ? Math.sin(tt * pa.sp + pa.ph) * pa.amp * (1 - p) : 0);\n    const py = (pa, tt, p) => lerp(pa.cy, pa.oy, p) + (animate ? Math.cos(tt * pa.sp + pa.ph) * pa.amp * (1 - p) : 0);\n    const draw = (now) => {\n      const tt = (now - t0) / 1000;\n      const p = smooth(progress());\n      const baseRGB = this.dark ? '236,231,220' : '30,26,46';\n      const sageRGB = this.dark ? '143,169,136' : '107,136,105';\n      ctx.clearRect(0, 0, W, H);\n      const linkA = (1 - p) * (this.dark ? 0.07 : 0.10);\n      if (linkA > 0.004) {\n        ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(' + baseRGB + ',' + linkA + ')';\n        for (const [a, b] of links) { const pa = parts[a], pb = parts[b]; ctx.beginPath(); ctx.moveTo(px(pa, tt, p), py(pa, tt, p)); ctx.lineTo(px(pb, tt, p), py(pb, tt, p)); ctx.stroke(); }\n      }\n      for (const pa of parts) {\n        const x = px(pa, tt, p), y = py(pa, tt, p);\n        const sageDot = pa.top;\n        const a = sageDot ? lerp(0.14, 0.5, p) : lerp(this.dark ? 0.07 : 0.09, this.dark ? 0.16 : 0.2, p);\n        ctx.fillStyle = 'rgba(' + (sageDot ? sageRGB : baseRGB) + ',' + a + ')';\n        const r = sageDot ? lerp(2, 2.8, p) : 2.1;\n        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();\n      }\n      this.raf = requestAnimationFrame(draw);\n    };\n    setup();\n    this._onResize = () => setup();\n    window.addEventListener('resize', this._onResize);\n    this.raf = requestAnimationFrame(draw);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
